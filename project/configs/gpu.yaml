# HuBERT ASR Fine-tuning - GPU Configuration
# Optimized for large GPUs (24GB+ VRAM, e.g., A100, V100, RTX 4090)

# ============== Model ==============
model:
  name: "facebook/hubert-base-ls960"
  freeze_feature_encoder: true
  attention_dropout: 0.1
  hidden_dropout: 0.1
  feat_proj_dropout: 0.0
  layerdrop: 0.1

# ============== Dataset ==============
dataset:
  name: "librispeech_asr"
  subset: "clean"  # Default fallback for unqualified split names
  train_split: "train.clean.100"
  cache_dir: null

# ============== Audio Processing ==============
audio:
  sampling_rate: 16000
  max_duration_sec: 20.0
  min_duration_sec: 0.5

# ============== Training ==============
training:
  output_dir: "./project/outputs/hubert-gpu"
  num_train_epochs: 300
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  lr_min: 5.0e-6  # Minimum LR at end of cosine decay (10% of initial)
  warmup_steps: 1000
  weight_decay: 0.005
  fp16: false
  bf16: true
  logging_steps: 100
  eval_steps: 500
  save_steps: 500
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false
  dataloader_num_workers: 8
  seed: 42

# ============== Evaluation ==============
evaluation:
  eval_splits:
    - "validation.clean"
  test_splits:
    - "validation.clean"
    - "validation.other"
    - "test.clean"
    - "test.other"

# ============== Decoding ==============
# CTC decoding settings - enable LM for better WER (matches paper results)
decoding:
  use_lm: false  # Set to true to enable beam search with LM
  lm_path: null  # Path to KenLM model (.arpa or .bin), e.g., "4-gram.arpa"
  beam_width: 100  # Beam width for beam search
  alpha: 0.5  # LM weight
  beta: 1.0  # Word insertion bonus

# ============== Device ==============
device:
  prefer: "cuda"
