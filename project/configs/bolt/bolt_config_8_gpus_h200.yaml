# To run: `source ./project/configs/bolt/h200_exports.sh && bolt task submit --interactive --tar . --config project/configs/bolt/bolt_config_8_gpus_h200.yaml`

# To connect with VSCode:
# 1. Activate a conda env with coreflow installed (markai git)
# 2. cd <markai_dir>
# 3. coreflow src.main vscode <bolt_id>
# 4. source activate iris

