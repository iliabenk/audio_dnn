name: "Training Development"

setup_command: "bash ./project/scripts/setup/setup.sh && bash ./project/scripts/setup/setup_interactive_git.sh"
command: "bash ./project/scripts/train_debug.sh"

permissions:
  viewers: "ibenkovitch"

project_id: "t288h_dsi"

resources:
  task_type: 8gpu
  timeout: 14d
  num_cpus: 96
  num_gpus: 8
  disk_gb: 4800
  memory_gb: 1100
  cluster: "aws_3"
  docker_image: docker.apple.com/iris/iris:2.18.4

#tags:
#  - MarkRL

priority: 1
cluster_options:
  aws:
    instance_type: p4d.24xlarge
dev_flags:
  KUBE_CLUSTER_ROUTABLE: 1
  BOLT_DEV_TOLERATIONS: >-
    aci.apple.com/adb-outofservice,npd.aci.apple.com/nodeuok-unhealthy,npd.aci.apple.com/os-unhealthy,npd.aci.apple.com/cst-pressure,bolt.apple.com/capacity-validation,bolt.apple.com/node-health,aci.apple.com/new-node,npd.aci.apple.com/nodeuok-unhealthy,maintenance.kube.apple.com/pending-maintenance,maintenance.kube.apple.com/maintenance-unhealthy,npd.aci.apple.com/scriptexporter-unhealthy,aci.apple.com/adb-outofservice,handoff.kube.apple.com/out-of-service

environment_variables:
  IRISCTL_ALIVENESS_CHECK_INTERVAL: '1200'
  IRISCTL_DISABLE_BOLT_PREFLIGHT_GPU_CHECK: 1
  BOLT_DEV_KUBE_CLUSTER_ROUTABLE: "1"
  BOLT_DEV_ENABLE_ROCE_MULTUS_MULTINIC: "1"
  BOLT_DEV_TOLERATIONS: "aci.apple.com/adb-outofservice,npd.aci.apple.com/nodeuok-unhealthy,node.kubernetes.io/unschedulable,npd.aci.apple.com/os-unhealthy,npd.aci.apple.com/cst-pressure,bolt.apple.com/capacity-validation,bolt.apple.com/node-health,aci.apple.com/new-node,npd.aci.apple.com/nodeuok-unhealthy,maintenance.kube.apple.com/pending-maintenance,maintenance.kube.apple.com/maintenance-unhealthy,npd.aci.apple.com/scriptexporter-unhealthy,aci.apple.com/adb-outofservice,handoff.kube.apple.com/out-of-service"
  IRIS_DISTRIBUTED_TIMEOUT: "86399"
  IRIS_TORCH_DISTRIBUTED_TIMEOUT: "7200"
  COREFLOW_CONTROLLER_ASYNC_CHECKPOINTING: "1"
  COREFLOW_LAZY_DOWNLOAD: "1"
  CORETORCH_NO_CUDA_IN_DATALOADERS: "1"
  NCCL_IB_GID_INDEX: "5"
  NCCL_IB_HCA: "mlx5_0,mlx5_3,mlx5_4,mlx5_5,mlx5_6,mlx5_7,mlx5_8,mlx5_9"
  NCCL_IB_DISABLE: "0"
  NCCL_SOCKET_IFNAME: "eth0"
  NCCL_CROSS_NIC: "0"
  NCCL_DEBUG: "INFO"
  UCX_NET_DEVICES: "mlx5_0:1,mlx5_3:1,mlx5_4:1,mlx5_5:1,mlx5_6:1,mlx5_7:1,mlx5_8:1,mlx5_9:1"
  NCCL_IGNORE_CPU_AFFINITY: "1"
  NCCL_ALGO: "Ring"
  NCCL_PROTO: "Simple"
  NCCL_MIN_NCHANNELS: "8"
  NCCL_DYNAMIC_CHUNK_SIZE: "524288"
  NCCL_P2P_NET_CHUNKSIZE: "524288"
  NCCL_P2P_PCI_CHUNKSIZE: "524288"
  NCCL_P2P_NVL_CHUNKSIZE: "1048576"
  NCCL_BUFFSIZE: "8388608"
  NCCL_NET_GDR_LEVEL: "PIX"
  NCCL_IB_PCI_RELAXED_ORDERING: "1"
  NCCL_IB_SPLIT_DATA_ON_QPS: "0"
  NCCL_IB_QPS_PER_CONNECTION: "8"