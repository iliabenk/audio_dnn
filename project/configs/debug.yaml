# HuBERT ASR Fine-tuning - Debug Configuration
# Quick testing with minimal resources

# ============== Model ==============
model:
  name: "facebook/hubert-base-ls960"
  freeze_feature_encoder: true
  attention_dropout: 0.1
  hidden_dropout: 0.1
  feat_proj_dropout: 0.0
  layerdrop: 0.1

# ============== Dataset ==============
dataset:
  name: "librispeech_asr"
  subset: "clean"
  train_split: "train.100"
  cache_dir: null

# ============== Audio Processing ==============
audio:
  sampling_rate: 16000
  max_duration_sec: 10.0
  min_duration_sec: 0.5

# ============== Training ==============
training:
  output_dir: "./project/outputs/debug"
  num_train_epochs: 1
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-5
  warmup_steps: 10
  weight_decay: 0.005
  fp16: false
  logging_steps: 10
  eval_steps: 50
  save_steps: 50
  save_total_limit: 1
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false
  dataloader_num_workers: 0
  seed: 42

# ============== Evaluation ==============
evaluation:
  eval_splits:
    - "validation.clean"
  test_splits:
    - "validation.clean"
    - "validation.other"
    - "test.clean"
    - "test.other"

# ============== Device ==============
device:
  prefer: "auto_no_mps"
