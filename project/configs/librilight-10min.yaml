# HuBERT ASR Fine-tuning - Libri-Light 10min Configuration
# Extreme low-resource training on 10 minutes of labeled data (from HuBERT paper)
#
# Dataset: Libri-Light limited supervision 10min subset
# This uses utterances from LibriSpeech train-clean-100 selected by Libri-Light

# ============== Model ==============
model:
  name: "facebook/hubert-base-ls960"
  freeze_feature_encoder: true
  attention_dropout: 0.2  # Strong dropout for extreme low-resource
  hidden_dropout: 0.2
  feat_proj_dropout: 0.1
  layerdrop: 0.15

# ============== Dataset ==============
# Libri-Light 10min subset - approximately 0.17% of train-clean-100
# Note: HuggingFace slicing rounds to nearest example, actual duration may vary
dataset:
  name: "librispeech_asr"
  subset: "clean"
  train_split: "train.clean.100[:50]"  # ~50 utterances ≈ 10 minutes
  cache_dir: null

# ============== Audio Processing ==============
audio:
  sampling_rate: 16000
  max_duration_sec: 20.0
  min_duration_sec: 0.5

# ============== Training ==============
# Maximum regularization for extreme low-resource scenario
training:
  output_dir: "./project/outputs/hubert-librilight-10min"
  bolt_metric_prefix: "librilight-10min"  # Prefix for Bolt metrics
  num_train_epochs: 500  # Very many epochs for tiny dataset
  per_device_train_batch_size: 2  # Very small batch
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 16  # Effective batch of 32
  learning_rate: 1.0e-5  # Very low LR
  lr_scheduler_type: "cosine"
  lr_min: 1.0e-7
  warmup_steps: 50
  weight_decay: 0.05  # Strong regularization
  fp16: false
  bf16: true
  logging_steps: 10
  eval_steps: 50
  save_steps: 5000
  save_total_limit: 5  # Keep more checkpoints for tiny dataset
  load_best_model_at_end: true
  metric_for_best_model: "wer"
  greater_is_better: false
  dataloader_num_workers: 2
  seed: 42

# ============== Evaluation ==============
evaluation:
  eval_splits:
    - "validation.clean"
  test_splits:
    - "validation.clean"
    - "validation.other"
    - "test.clean"
    - "test.other"

# ============== Decoding ==============
# LM decoding particularly helpful for extreme low-resource
decoding:
  use_lm: false
  lm_path: null
  beam_width: 100
  alpha: 0.5
  beta: 1.0

# ============== Device ==============
device:
  prefer: "auto"
